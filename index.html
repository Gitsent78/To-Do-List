<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TASKR</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="app">
    <header>
      <h1>TASKR</h1>
      <span id="count">0 tasks</span>
    </header>

    <form id="task-form">
      <input type="text" id="task-input" placeholder="Add a new task..." required/>
      <input type="date" id="due-date"/>
      <button type="submit">＋ Add</button>
    </form>

    <div class="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="pending">Pending</button>
      <button class="filter" data-filter="done">Done</button>
    </div>

    <ul id="task-list"></ul>
    <p id="empty">No tasks yet. Add one above ↑</p>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
